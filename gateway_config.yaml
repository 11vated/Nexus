model_list:
  # Ollama local models
  - model_name: llama3.2:latest
    litellm_params:
      model: ollama/llama3.2:latest
      api_base: http://localhost:11434

  - model_name: qwen2.5-coder:14b
    litellm_params:
      model: ollama/qwen2.5-coder:14b
      api_base: http://localhost:11434

  - model_name: deepseek-r1:7b
    litellm_params:
      model: ollama/deepseek-r1:7b
      api_base: http://localhost:11434

  # GGUF via llama.cpp server
  - model_name: qwen2.5-coder:14b-gguf
    litellm_params:
      model: openai/qwen2.5-coder:14b
      api_base: http://localhost:8080/v1
      api_key: dummy

  - model_name: codellama-7b-gguf
    litellm_params:
      model: openai/codellama-7b-instruct-q4_K_M
      api_base: http://localhost:8080/v1
      api_key: dummy

  # Cloud models (optional - uncomment and set API keys to enable)
  # - model_name: gpt-4o
  #   litellm_params:
  #     model: gpt-4o
  #     api_key: ${OPENAI_API_KEY}
  #
  # - model_name: gpt-4o-mini
  #   litellm_params:
  #     model: gpt-4o-mini
  #     api_key: ${OPENAI_API_KEY}

  # MiniMax models (local via llama.cpp or remote)
  - model_name: minimax-m2-local
    litellm_params:
      model: openai/minimax-m2
      api_base: http://localhost:8080/v1
      api_key: dummy
  #
  # - model_name: claude-3.5-sonnet
  #   litellm_params:
  #     model: claude-3.5-sonnet-20241022
  #     api_key: ${ANTHROPIC_API_KEY}

  # MiniMax models (free alternative)
  - model_name: minimax-max-m2.5-free
    litellm_params:
      model: minimax-max-m2.5-free
      api_base: https://api.minimax.chat/v1
      api_key: ${MINIMAX_API_KEY:-dummy}

# Router settings for automatic fallback
router_settings:
  routing_strategy: "latency-based-routing"  # or "usage-based", "simple-shuffle"
  
  # Failover: if primary fails, try these in order
  fallbacks:
    - model: deepseek-r1:7b
      fallback: [qwen2.5-coder:14b, llama3.2:latest]
    - model_name: gpt-4o
      fallback: [qwen2.5-coder:14b, gpt-4o-mini]

  # Redis for caching (optional)
  # redis_host: localhost
  # redis_port: 6379

# Model group mappings for specific tasks
model_groups:
  # Fast coding tasks
  coding_fast:
    - qwen2.5-coder:7b
    - llama3.2:1b
  
  # Powerful coding
  coding_strong:
    - qwen2.5-coder:14b
    - codellama-7b-gguf
  
  # Reasoning/debugging
  reasoning:
    - deepseek-r1:7b
  
  # Vision tasks
  vision:
    - llava
    - moondream

# Custom prompt templates
prompt_adapters:
  - model_name: qwen2.5-coder:14b
    adapter: custom_prompts/coder适配.md

# Environment variables to pass to all models
environmental_variables:
  OLLAMA_BASE_URL: http://localhost:11434

# Health check / monitoring
health_check:
  disabled: false
  interval: 60
  timeout: 10

# Logging
database:
  # Use Redis for caching
  type: redis
  host: localhost
  port: 6379

# UI settings
ui:
  port: 4000
  # port: 443  # HTTPS
  show_credentials: true  # Show API keys in UI