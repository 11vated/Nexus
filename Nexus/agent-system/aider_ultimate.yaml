# Aider Config - NEXUS ULTIMATE - ALL MODELS SUPPORTED
# Works with: OpenCode, VSCode, Aider, Goose, CLI
# All Ollama models available with auto-selection

model: ollama/qwen2.5-coder:14b
openai-api-base: http://localhost:11434/v1
openai-api-key: local

# Full execution permissions
auto-commits: true
no-git: true
edit-format: whole
cache-prompts: true
no-show-model-warnings: true
no-pretty: false

