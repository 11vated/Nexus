version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: nexus-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - nexus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  nexus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-core
    volumes:
      - workspace_data:/workspace
      - ./src:/app/src
    ports:
      - "8000:8000"  # Metrics
      - "8080:8080"  # Health API
    environment:
      - OLLAMA_URL=http://ollama:11434
      - NEXUS_LOG_LEVEL=INFO
      - WORKSPACE_ROOT=/workspace
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - nexus-network
    restart: unless-stopped

  # Optional: Add a self-hosted model marketplace
  # model-registry:
  #   image: ghcr.io/ollama/ollama:latest
  #   container_name: nexus-model-registry
  #   volumes:
  #     - models_data:/models
  #   ports:
  #     - "11435:11434"
  #   networks:
  #     - nexus-network

volumes:
  ollama_data:
  workspace_data:
  # models_data:

networks:
  nexus-network:
    driver: bridge